version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: steam-postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  etl:

    build: ./etl

    depends_on:
      - postgres

    env_file:
      - .env

  api:

    build: ./api

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "8000:8000"

  dashboard:

    build: ./dashboard

    depends_on:
      - postgres

    ports:
      - "3838:3838"

volumes:

  postgres_data: