services:
  postgres:
    image: postgres:16
    container_name: steam-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: ./etl
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build: ./dashboard
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3838:3838"
volumes:
  postgres_data: